name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    name: tests + package (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.14"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and test dependencies
        run: python -m pip install . pytest build
      - name: Run tests
        run: python -m pytest -q
      - name: Build source and wheel packages
        run: python -m build
      - name: Verify packages contain only the public runtime
        run: python packaging/verify_open_core_artifact.py dist

  bundled-smoke:
    name: bundled sidecar smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package, bundler, and tests
        run: python -m pip install ".[packaging]" pytest
      - name: Run source unit suite
        run: python -m pytest -q
      - name: Build onedir sidecar
        run: pyinstaller --clean --noconfirm packaging/postmortem-sidecar.spec
      - name: Verify sidecar contains only the public runtime
        run: >-
          python packaging/verify_open_core_artifact.py
          dist/postmortem-sidecar
      - name: Smoke bundled binary without system Python on PATH
        run: >-
          python packaging/smoke_bundle.py
          dist/postmortem-sidecar/postmortem-sidecar
