name: release sidecar bundles

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  bundle:
    name: bundled sidecar (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            binary: dist/postmortem-sidecar/postmortem-sidecar
            archive_format: gztar
          - os: macos-latest
            platform: macos
            binary: dist/postmortem-sidecar/postmortem-sidecar
            archive_format: gztar
          - os: windows-latest
            platform: windows
            binary: dist/postmortem-sidecar/postmortem-sidecar.exe
            archive_format: zip

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package, bundler, and tests
        run: python -m pip install ".[packaging]" pytest
      - name: Run source unit suite
        run: python -m pytest -q
      - name: Build onedir sidecar
        run: pyinstaller --clean --noconfirm packaging/postmortem-sidecar.spec
      - name: Verify bundle contains only the public runtime
        run: >-
          python packaging/verify_open_core_artifact.py
          dist/postmortem-sidecar
      - name: Smoke bundled binary without system Python on PATH
        run: >-
          python packaging/smoke_bundle.py "${{ matrix.binary }}"
          --metrics-out
          artifacts/postmortem-sidecar-${{ github.ref_name }}-${{ matrix.platform }}-${{ runner.arch }}.metrics.json
      - name: Archive bundle and write SHA-256
        run: >-
          python packaging/archive_bundle.py dist/postmortem-sidecar
          artifacts/postmortem-sidecar-${{ github.ref_name }}-${{ matrix.platform }}-${{ runner.arch }}
          --format ${{ matrix.archive_format }}
      - uses: actions/upload-artifact@v4
        with:
          name: postmortem-sidecar-${{ github.ref_name }}-${{ matrix.platform }}-${{ runner.arch }}
          path: artifacts/
          if-no-files-found: error
